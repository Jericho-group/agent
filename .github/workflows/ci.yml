name: CI — Lint & Type Check

# Запускается на каждый PR и пуш в любую ветку
on:
  push:
    branches: ["*"]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Ruff Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check .

  # ── Проверка что .env не попал в коммит ──────────────────────────────────
  security:
    name: Secret Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check no .env files committed
        run: |
          if git ls-files | grep -E '^\.env$|^.*\.env$' | grep -v '.env.example'; then
            echo "ERROR: .env file found in repo! Remove it immediately."
            exit 1
          fi
          echo "OK: No .env files in repo"

      - name: Check no API keys in code
        run: |
          # Ищем паттерны ключей (грубая проверка)
          if grep -r "sk-[a-zA-Z0-9]{48}" --include="*.py" .; then
            echo "ERROR: Possible OpenAI key found in code!"
            exit 1
          fi
          echo "OK: No keys found in code"
